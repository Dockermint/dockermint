name: Refactor
description: Propose a code refactor that does not change functionality.
title: "[Refactor]: "
labels: ["refactor"]
type: Task
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the refactor and which code is affected.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this refactor needed? What does it improve?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which modules, files, or functions are affected?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context or references.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/Dockermint/dockermint/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
