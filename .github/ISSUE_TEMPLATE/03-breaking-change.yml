name: Breaking Change
description: Propose a breaking change to existing functionality.
title: "[Breaking]: "
labels: ["breaking-change"]
type: Feature
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the breaking change.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this breaking change necessary?
    validations:
      required: true
  - type: textarea
    id: migration-path
    attributes:
      label: Migration path
      description: How should existing users migrate? Describe the steps or changes needed.
    validations:
      required: true
  - type: textarea
    id: affected-components
    attributes:
      label: Affected components
      description: Which modules, APIs, CLI flags, or config options are impacted?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context or references.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/Dockermint/dockermint/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
