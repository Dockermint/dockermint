name: Dependency
description: Upgrade, replace, or remove a dependency.
title: "[Dependency]: "
labels: ["dependency"]
type: Task
body:
  - type: dropdown
    id: change-type
    attributes:
      label: Change type
      options:
        - Upgrade
        - Replace
        - Remove
        - Add new dependency
    validations:
      required: true
  - type: input
    id: crate-name
    attributes:
      label: Crate name
      placeholder: e.g. tokio
    validations:
      required: true
  - type: input
    id: current-version
    attributes:
      label: Current version
      description: Leave empty if adding a new dependency.
      placeholder: e.g. 1.38.0
    validations:
      required: false
  - type: input
    id: target-version
    attributes:
      label: Target version
      description: Leave empty if removing.
      placeholder: e.g. 1.40.0
    validations:
      required: false
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this dependency change needed?
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: New dependency is license-compatible
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/Dockermint/dockermint/blob/main/CODE_OF_CONDUCT.md)
          required: true
