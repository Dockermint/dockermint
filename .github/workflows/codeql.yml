name: CodeQL

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
