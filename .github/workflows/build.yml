name: Build

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.1"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: false
            extra-features: ""
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: false
            extra-features: "openssl-vendored"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            extra-features: "openssl-vendored"
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            extra-features: "openssl-vendored"
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
            extra-features: ""
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
          if echo "${{ matrix.target }}" | grep -q "musl"; then
            sudo apt-get install -y musl-tools
          fi

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          EXTRA="${{ matrix.extra-features }}"
          FEAT_FLAG=""
          if [ -n "$EXTRA" ]; then
            FEAT_FLAG="--features $EXTRA"
          fi
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} $FEAT_FLAG
          else
            cargo build --release --locked --target ${{ matrix.target }} $FEAT_FLAG
          fi

      - name: Run tests
        run: |
          EXTRA="${{ matrix.extra-features }}"
          FEAT_FLAG=""
          if [ -n "$EXTRA" ]; then
            FEAT_FLAG="--features $EXTRA"
          fi
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross test --release --locked --target ${{ matrix.target }} $FEAT_FLAG
          else
            cargo test --release --locked --target ${{ matrix.target }} $FEAT_FLAG
          fi
